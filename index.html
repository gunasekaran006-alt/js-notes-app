<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JavaScript Todo App">
    <title>JavaScript Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TODO</h1>
            <button id="theme-icon">🌙</button>
        </header>

        <div class="input-container">
            <input type="text" id="noteInput" placeholder="Create a new todo...">
        </div>

        <div class="notes-wrapper">
            <ul id="notesList"></ul>
            <div class="footer">
                <span id="itemsLeft">0 items left</span>
                <div class="filters">
                    <button class="active" data-filter="all">All</button>
                    <button data-filter="active">Active</button>
                    <button data-filter="completed">Completed</button>
                </div>
                <button id="clearCompletedBtn">Clear Completed</button>
            </div>
        </div>
        
        <p class="instruction">Add your daily tasks above!</p> 
    </div>

    <script src="script.js"></script>
</body>
</html>
