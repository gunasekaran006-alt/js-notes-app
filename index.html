<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Task Manager">
    <title>My Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>My Tasks</h1>
            <button id="theme-icon" aria-label="Toggle theme">🌗</button>
        </header>

        <div class="task-input-box">
            <input type="text" id="noteInput" placeholder="What needs to be done?">
            <button id="addBtn">Add</button>
        </div>

        <div class="task-board">
            <ul id="notesList"></ul>
            
            <div class="board-controls">
                <span id="itemsLeft">0 pending</span>
                <div class="filters">
                    <button class="active" data-filter="all">All</button>
                    <button data-filter="active">Active</button>
                    <button data-filter="completed">Done</button>
                </div>
                <button id="clearCompletedBtn">Clear Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
